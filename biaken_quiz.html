<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>目指せびあけん！ビア子のクイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --black: #111111;
    --red: #CC0000;
    --red-dark: #990000;
    --yellow: #FFCC00;
    --yellow-dim: #ccaa00;
    --white: #F5F5F5;
    --cream: #E8D9B5;
    --cream-dark: #D4C090;
    --cream-card: #F0E4C4;
    --gray: #C8B898;
    --gray2: #DDD0AA;
    --text: #2a1f0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ヘッダー */
  #header {
    width: 100%;
    background: var(--red);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 3px 0 var(--yellow);
  }
  #header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    color: var(--yellow);
    letter-spacing: 0.05em;
    text-shadow: 1px 1px 0 #000;
  }
  #progress-text {
    font-size: 0.75rem;
    color: #fff;
    font-weight: 700;
  }

  /* プログレスバー */
  #progress-bar-wrap {
    width: 100%;
    height: 5px;
    background: var(--gray);
  }
  #progress-bar {
    height: 100%;
    background: var(--yellow);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* メインコンテンツ */
  #main {
    width: 100%;
    max-width: 480px;
    padding: 0 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ビア子エリア */
  #biako-area {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-top: 16px;
  }
  #biako-img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    flex-shrink: 0;
    transition: opacity 0.2s;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }
  #biako-bubble {
    background: var(--cream-card);
    border: 2px solid var(--yellow-dim);
    border-radius: 16px 16px 16px 4px;
    padding: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
    position: relative;
    flex: 1;
    min-height: 56px;
    display: flex;
    align-items: center;
  }

  /* ジャンルバッジ */
  #genre-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    color: var(--yellow);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  #difficulty {
    color: var(--yellow);
    font-size: 0.8rem;
    margin-left: auto;
  }
  #meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 問題カード */
  #question-card {
    background: var(--cream-card);
    border: 2px solid var(--cream-dark);
    border-top: 3px solid var(--red);
    border-radius: 12px;
    padding: 16px;
  }
  #question-number {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 6px;
  }
  #question-passage {
    background: var(--cream-dark);
    border-left: 3px solid var(--red);
    padding: 10px 12px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    border-radius: 0 8px 8px 0;
    margin-bottom: 12px;
    display: none;
  }
  #question-text {
    font-size: 0.92rem;
    line-height: 1.7;
    font-weight: 700;
    color: var(--text);
  }

  /* 選択肢 */
  #choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice-btn {
    background: var(--cream-card);
    border: 2px solid var(--cream-dark);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 0.88rem;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
    -webkit-appearance: none;
    width: 100%;
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.hover-active { border-color: var(--red); background: #f5e8c8; }
  .choice-label {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    color: var(--red);
    flex-shrink: 0;
    font-weight: 700;
    min-width: 20px;
  }
  .choice-btn.correct {
    border-color: #228800;
    background: #d4f0c0;
    animation: pulse-correct 0.4s ease;
  }
  .choice-btn.wrong {
    border-color: var(--red);
    background: #f5d0d0;
    animation: pulse-wrong 0.4s ease;
  }
  .choice-btn.reveal-correct {
    border-color: #228800;
    background: #d4f0c0;
  }
  .choice-btn:disabled { cursor: default; }

  @keyframes pulse-correct {
    0% { transform: scale(1); }
    40% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  @keyframes pulse-wrong {
    0% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
    100% { transform: translateX(0); }
  }

  /* 解説エリア */
  #explanation-area {
    background: var(--cream-card);
    border: 2px solid var(--red);
    border-radius: 12px;
    padding: 16px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #explanation-header {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    color: var(--red);
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  #explanation-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: var(--text);
  }

  /* 次へボタン */
  #next-btn {
    background: var(--red);
    color: var(--yellow);
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    cursor: pointer;
    display: none;
    box-shadow: 0 4px 0 var(--red-dark);
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  #next-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--red-dark);
  }

  /* ===== スタート画面 ===== */
  #start-screen {
    width: 100%;
    max-width: 480px;
    padding: 24px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #start-logo-img {
    width: 100%;
    max-width: 400px;
    height: auto;
    border-radius: 16px;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25));
  }
  #start-bubble {
    background: var(--cream-card);
    border: 2px solid var(--yellow-dim);
    border-radius: 16px;
    padding: 16px;
    font-size: 0.88rem;
    line-height: 1.7;
    text-align: center;
    color: var(--text);
  }
  #start-bubble strong { color: var(--red); }
  #start-btn {
    background: var(--yellow);
    color: var(--black);
    font-family: 'Oswald', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    border: none;
    border-radius: 12px;
    padding: 16px 40px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--yellow-dim);
    transition: all 0.15s;
    -webkit-appearance: none;
    width: 100%;
  }
  #start-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--yellow-dim);
  }
  .german-flag {
    display: flex;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
  }
  .german-flag div { flex: 1; }
  .gf-black { background: #111; }
  .gf-red { background: var(--red); }
  .gf-yellow { background: var(--yellow); }

  /* ===== リザルト画面 ===== */
  #result-screen {
    width: 100%;
    max-width: 480px;
    padding: 24px 16px 40px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  #result-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.5rem;
    color: var(--red);
    text-shadow: 2px 2px 0 var(--yellow-dim);
    text-align: center;
  }
  #result-score-card {
    width: 100%;
    background: var(--cream-card);
    border: 3px solid var(--yellow-dim);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  #result-score {
    font-family: 'Oswald', sans-serif;
    font-size: 4rem;
    color: var(--red);
    line-height: 1;
  }
  #result-score span { font-size: 1.5rem; color: var(--text); }
  #result-label {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 8px;
    color: var(--text);
  }
  #result-biako {
    width: 140px;
    filter: drop-shadow(0 4px 12px rgba(204,0,0,0.3));
  }
  #result-comment {
    background: var(--cream-card);
    border: 2px solid var(--yellow-dim);
    border-radius: 16px;
    padding: 16px;
    font-size: 0.88rem;
    line-height: 1.7;
    text-align: center;
    width: 100%;
    color: var(--text);
  }
  #result-comment strong { color: var(--red); }
  #retry-btn {
    background: var(--red);
    color: var(--yellow);
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    border: none;
    border-radius: 12px;
    padding: 14px;
    width: 100%;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--red-dark);
    -webkit-appearance: none;
  }

  /* ===== 文章問題の複数設問エリア ===== */
  #group-questions {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .group-q-block {
    background: var(--cream-card);
    border: 2px solid var(--cream-dark);
    border-top: 3px solid var(--red);
    border-radius: 12px;
    padding: 14px;
  }
  .group-q-label {
    font-family: 'Oswald', sans-serif;
    color: var(--red);
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .group-q-text {
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 10px;
    color: var(--text);
  }
  .group-choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ===== グループ解説 ===== */
  .group-explanation-block {
    background: var(--cream-dark);
    border-left: 3px solid var(--red);
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    margin-top: 10px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text);
    display: none;
  }
  .group-explanation-header {
    font-weight: 700;
    color: var(--red);
    margin-bottom: 4px;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<!-- ヘッダー（クイズ中のみ表示） -->
<div id="header" style="display:none;">
  <h1>🍺 びあけん 2級</h1>
  <div id="progress-text">1 / 100</div>
</div>
<div id="progress-bar-wrap" style="display:none;">
  <div id="progress-bar"></div>
</div>

<!-- ===== スタート画面 ===== -->
<div id="start-screen">
  <img id="start-logo-img" src="title.png" alt="ビア子のびあけん2級クイズ">
  <div id="start-bubble">
    <strong>ワタシ、ビールの妖精ビア子です！</strong><br>
    これからアナタをびあけんに合格させるために頑張ります！<br>
    いわばトレーナーというやつです。<br>
    アナタはウマ娘で言うウマ娘です！<br><br>
    目指せ有馬記念！！🏆<br><br>
    <small style="color:#888;">全100問 / 70点以上で合格</small>
  </div>
  <button id="start-btn" onclick="startQuiz()">START QUIZ !</button>
</div>

<!-- ===== クイズ画面 ===== -->
<div id="main" style="display:none;">
  <div id="biako-area">
    <img id="biako-img" src="biako_normal.png" alt="ビア子">
    <div id="biako-bubble">問題を読んで、答えを選んでね！</div>
  </div>

  <div id="meta-row">
    <div id="genre-badge">❶ 基本・原料</div>
    <div id="difficulty">★★★</div>
  </div>

  <!-- 通常問題 -->
  <div id="normal-question-area">
    <div id="question-card">
      <div id="question-number">Q1</div>
      <div id="question-passage"></div>
      <div id="question-text"></div>
    </div>
    <div id="choices"></div>
    <div id="explanation-area">
      <div id="explanation-header">📖 解説</div>
      <div id="explanation-text"></div>
    </div>
  </div>

  <!-- 文章グループ問題 -->
  <div id="group-question-area" style="display:none;">
    <div id="question-card-group">
      <div id="question-passage-group" style="background:var(--cream-dark);border-left:3px solid var(--red);padding:10px 12px;font-size:0.82rem;line-height:1.7;color:var(--text);border-radius:0 8px 8px 0;margin-bottom:4px;"></div>
    </div>
    <div id="group-questions"></div>
    <div id="group-explanation-area" style="display:none;">
      <div id="explanation-header-group" style="font-family:'Oswald',sans-serif;font-size:0.85rem;color:var(--red);font-weight:700;margin-bottom:8px;letter-spacing:0.05em;">📖 解説</div>
    </div>
  </div>

  <button id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
</div>

<!-- ===== リザルト画面 ===== -->
<div id="result-screen">
  <div id="result-title">RESULT 🍺</div>
  <div class="german-flag"><div class="gf-black"></div><div class="gf-red"></div><div class="gf-yellow"></div></div>
  <img id="result-biako" src="biako_normal.png" alt="ビア子">
  <div id="result-score-card">
    <div id="result-score">0<span> / 100点</span></div>
    <div id="result-label"></div>
  </div>
  <div id="result-comment"></div>
  <button id="retry-btn" onclick="retryQuiz()">もう一度チャレンジ！</button>
</div>

<script>
// =============================
// 問題データ
// 通常問題: { type:'single', qNum, genre, difficulty, text, choices, answer, explanation }
// 文章問題: { type:'group', genre, passage, qs:[{ qNum, difficulty, text, choices, answer, explanation }] }
// =============================
const QUESTIONS = [
  // ===== ❶ 基本・原料 =====
  {
    type: 'single',
    qNum: 'Q1', genre: '❶ 基本・原料', difficulty: '★★★',
    text: 'ビールのように、原料に含まれるデンプンが糖化されて糖が生成され、その後に糖が発酵する酒を何というか、次の選択肢より選べ。',
    choices: ['並行複発酵酒', '単行複発酵酒', '並行複蒸留酒', '単行複蒸留酒'],
    answer: 1,
    explanation: 'デンプンの糖化と糖の発酵が「順番に（単行）」かつ「2段階（複）」で行われる酒が「単行複発酵酒」。ビールがその代表例。日本酒は糖化と発酵が同時進行する「並行複発酵酒」なので混同しないように注意！'
  },
  {
    type: 'single',
    qNum: 'Q2', genre: '❶ 基本・原料', difficulty: '★★★',
    text: '2018年4月の酒税法改正で、新たに追加となった副原料（果実やコリアンダー等香味料）のビールでの使用は、麦芽重量の何％まで認められているか、次の選択肢より選べ。',
    choices: ['3％', '5％', '7％', '10％'],
    answer: 1,
    explanation: '2018年の酒税法改正で、果実・香辛料・ハーブ・花などの香味料がビールの副原料として認められた。その使用量は麦芽重量の5%以内。これによりクラフトビールの多様化が進んだ。'
  },
  {
    type: 'single',
    qNum: 'Q3', genre: '❶ 基本・原料', difficulty: '★★☆',
    text: '新ジャンル（第3のビール）の酒税法上の品目は、2023年10月施行の改正酒税法により何になったか。次の選択肢より選べ。',
    choices: ['その他の醸造酒', 'リキュール', '発泡酒', '雑酒'],
    answer: 2,
    explanation: '2023年10月の酒税改正で、第3のビール（新ジャンル）は酒税法上「発泡酒」に統合された。これにより「ビール」「発泡酒」の2分類に整理された。'
  },
  {
    type: 'single',
    qNum: 'Q4', genre: '❶ 基本・原料', difficulty: '★★☆',
    text: '日本の表示基準における「生ビール」を正しく説明している英語を、次の選択肢より選べ。',
    choices: ['draft beer', 'keg beer', 'pasteurized beer', 'unpasteurized beer'],
    answer: 3,
    explanation: '日本の「生ビール」とは、熱処理（パスチャライズ）をしていないビールのこと。英語では「unpasteurized beer」が正確な表現。「draft beer」は樽生を意味し、国によって定義が異なる。'
  },
  {
    type: 'group',
    genre: '❶ 基本・原料',
    passage: '【文章】\n財務省による「平成29年度税制改正」を受け、2020年10月から( ❶ )年10月にかけて、ビール・発泡酒・新ジャンルの酒税を3段階に分けて改正し、最終的に1KLあたり( ❷ )円に統一する。',
    qs: [
      {
        qNum: 'Q5', difficulty: '★★★',
        text: '( ❶ )に入る適切な語句を次の選択肢より選べ。',
        choices: ['2025', '2026', '2027', '2028'],
        answer: 1,
        explanation: '酒税改正は2020年・2023年・2026年の3段階。最終段階は2026年10月に1KLあたり155,000円に統一される予定。'
      },
      {
        qNum: 'Q6', difficulty: '★☆☆',
        text: '( ❷ )に入る適切な語句を次の選択肢より選べ。',
        choices: ['108,000円', '134,000円', '155,000円', '181,000円'],
        answer: 2,
        explanation: '最終的な統一税率は1KLあたり155,000円。現行のビール税率（2023年時点）より低く、発泡酒・新ジャンルより高い水準に収束する。'
      },
      {
        qNum: 'Q7', difficulty: '★☆☆',
        text: 'ビールは2023年10月に2段階目の減税となったが、1KLあたりの税率はいくらになったか。次の選択肢より選べ。',
        choices: ['108,000円', '134,000円', '155,000円', '181,000円'],
        answer: 3,
        explanation: '2023年10月時点のビール税率は1KLあたり181,000円（2段階目）。最終的に2026年に155,000円になる。数字が多く紛らわしいが、改正の方向は「ビールは減税・発泡酒/新ジャンルは増税」で覚えよう。'
      }
    ]
  },
  {
    type: 'single',
    qNum: 'Q8', genre: '❶ 基本・原料', difficulty: '★★★',
    text: '2018年4月の改正酒税法に追加された副原料で正しいものを、次の選択肢より選べ。',
    choices: ['とうもろこし', 'でん粉', '糖類', '蜂蜜'],
    answer: 3,
    explanation: '2018年の酒税法改正で新たに副原料として認められたのは、果実・香辛料・ハーブ・花・蜂蜜など。とうもろこし・でん粉・糖類は以前からビール副原料として認められていた。'
  },
  {
    type: 'single',
    qNum: 'Q9', genre: '❶ 基本・原料', difficulty: '★★☆',
    text: '大麦の構造で、酵素を合成・分泌したり、発芽に必要なホルモンを伝達する役割がある部分はどこか。適切なものを次の選択肢より選べ。',

// =============================
// ゲーム状態
// =============================
let currentIndex = 0;
let score = 0;
let answered = false;
let groupAnswers = []; // グループ問題の回答状態

// =============================
// 画面切り替え
// =============================
function showScreen(screen) {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('header').style.display = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';

  if (screen === 'start') {
    document.getElementById('start-screen').style.display = 'flex';
  } else if (screen === 'quiz') {
    document.getElementById('header').style.display = 'flex';
    document.getElementById('progress-bar-wrap').style.display = 'block';
    document.getElementById('main').style.display = 'flex';
  } else if (screen === 'result') {
    document.getElementById('result-screen').style.display = 'flex';
  }
}

function startQuiz() {
  currentIndex = 0;
  score = 0;
  showScreen('quiz');
  renderQuestion();
}

function retryQuiz() {
  startQuiz();
}

// =============================
// 問題数カウント（グループは複数問）
// =============================
function getTotalQuestions() {
  let total = 0;
  QUESTIONS.forEach(q => {
    total += q.type === 'group' ? q.qs.length : 1;
  });
  return total;
}

function getQuestionIndexLabel() {
  let count = 0;
  for (let i = 0; i < currentIndex; i++) {
    count += QUESTIONS[i].type === 'group' ? QUESTIONS[i].qs.length : 1;
  }
  return count + 1;
}

// =============================
// 問題表示
// =============================
function renderQuestion() {
  answered = false;
  groupAnswers = [];

  const q = QUESTIONS[currentIndex];
  const total = getTotalQuestions();
  const current = getQuestionIndexLabel();

  // プログレス更新
  document.getElementById('progress-text').textContent = `${current} / ${total}`;
  document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;

  // ビア子リセット
  setBiako('normal', '問題を読んで、答えを選んでね！');

  // 解説・次へボタン非表示
  document.getElementById('explanation-area').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  if (q.type === 'single') {
    renderSingleQuestion(q);
  } else {
    renderGroupQuestion(q);
  }
}

function renderSingleQuestion(q) {
  document.getElementById('normal-question-area').style.display = 'block';
  document.getElementById('group-question-area').style.display = 'none';

  document.getElementById('genre-badge').textContent = q.genre;
  document.getElementById('difficulty').textContent = q.difficulty;
  document.getElementById('question-number').textContent = q.qNum;
  document.getElementById('question-text').textContent = q.text;

  const passage = document.getElementById('question-passage');
  passage.style.display = 'none';

  // 選択肢
  const labels = ['A', 'B', 'C', 'D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i, q.answer, q.explanation, q.difficulty);
    choicesEl.appendChild(btn);
  });
}

function renderGroupQuestion(q) {
  document.getElementById('normal-question-area').style.display = 'none';
  document.getElementById('group-question-area').style.display = 'block';

  document.getElementById('genre-badge').textContent = q.genre;
  document.getElementById('difficulty').textContent = '';
  document.getElementById('question-passage-group').textContent = q.passage;

  const groupQs = document.getElementById('group-questions');
  groupQs.innerHTML = '';

  const groupExpl = document.getElementById('group-explanation-area');
  groupExpl.style.display = 'none';
  // 既存の解説ブロックをクリア（ヘッダー以外）
  const existingExpls = groupExpl.querySelectorAll('.group-explanation-block');
  existingExpls.forEach(e => e.remove());

  const labels = ['A', 'B', 'C', 'D'];

  q.qs.forEach((subQ, qIdx) => {
    const block = document.createElement('div');
    block.className = 'group-q-block';
    block.id = `group-block-${qIdx}`;

    const label = document.createElement('div');
    label.className = 'group-q-label';
    label.textContent = `${subQ.qNum}　${subQ.difficulty}`;

    const text = document.createElement('div');
    text.className = 'group-q-text';
    text.textContent = subQ.text;

    const choicesDiv = document.createElement('div');
    choicesDiv.className = 'group-choices';
    choicesDiv.id = `group-choices-${qIdx}`;

    subQ.choices.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${c}</span>`;
      btn.onclick = () => selectGroupAnswer(qIdx, i, q.qs, q);
      choicesDiv.appendChild(btn);
    });

    block.appendChild(label);
    block.appendChild(text);
    block.appendChild(choicesDiv);
    groupQs.appendChild(block);

    // 解説用ブロックをgroup-explanation-areaに追加
    const explBlock = document.createElement('div');
    explBlock.className = 'group-explanation-block';
    explBlock.id = `group-expl-${qIdx}`;
    const explHeader = document.createElement('div');
    explHeader.className = 'group-explanation-header';
    explHeader.textContent = `${subQ.qNum} の解説`;
    explBlock.appendChild(explHeader);
    const explText = document.createElement('div');
    explText.textContent = subQ.explanation;
    explBlock.appendChild(explText);
    groupExpl.appendChild(explBlock);
  });

  groupAnswers = new Array(q.qs.length).fill(null);
}

// =============================
// 通常問題：回答処理
// =============================
function selectAnswer(selected, correct, explanation, difficulty) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('#choices .choice-btn');
  btns.forEach(btn => btn.disabled = true);

  const isCorrect = selected === correct;
  if (isCorrect) score++;

  btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[correct].classList.add('reveal-correct');

  // 解説表示
  document.getElementById('explanation-text').textContent = explanation;
  document.getElementById('explanation-area').style.display = 'block';

  // ビア子リアクション
  if (isCorrect) {
    setBiako('happy', '正解！さすがウマ娘！🏆');
  } else {
    const diff = difficulty;
    if (diff === '★☆☆') {
      setBiako('cry', '難問だったね…でも次は大丈夫！');
    } else {
      setBiako('sad', 'あれ…違うよ。もう一回復習しよう！');
    }
  }

  document.getElementById('next-btn').style.display = 'block';
}

// =============================
// グループ問題：回答処理
// =============================
function selectGroupAnswer(qIdx, selected, subQs, parentQ) {
  if (groupAnswers[qIdx] !== null) return;
  groupAnswers[qIdx] = selected;

  const correct = subQs[qIdx].answer;
  const isCorrect = selected === correct;
  if (isCorrect) score++;

  const choicesDiv = document.getElementById(`group-choices-${qIdx}`);
  const btns = choicesDiv.querySelectorAll('.choice-btn');
  btns.forEach(btn => btn.disabled = true);
  btns[selected].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) btns[correct].classList.add('reveal-correct');

  // 解説を表示
  document.getElementById(`group-expl-${qIdx}`).style.display = 'block';

  // ビア子
  if (isCorrect) {
    setBiako('happy', '正解！どんどんいこう！🍺');
  } else {
    setBiako('sad', 'う〜ん、惜しい！解説を確認しよう！');
  }

  // 全問回答したか確認
  const allAnswered = groupAnswers.every(a => a !== null);
  if (allAnswered) {
    document.getElementById('group-explanation-area').style.display = 'block';
    document.getElementById('next-btn').style.display = 'block';

    // グループ全体のビア子コメント
    const correctCount = groupAnswers.filter((a, i) => a === subQs[i].answer).length;
    if (correctCount === subQs.length) {
      setBiako('guts', `全問正解！完璧です！！🏆`);
    } else if (correctCount === 0) {
      setBiako('cry', `う〜…全部不正解。一緒に復習しよう！`);
    } else {
      setBiako('explanation', `${correctCount}/${subQs.length}正解！いい調子！`);
    }
  }
}

// =============================
// 次の問題へ
// =============================
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= QUESTIONS.length) {
    showResult();
  } else {
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

// =============================
// リザルト画面
// =============================
function showResult() {
  const total = getTotalQuestions();
  const pct = Math.round((score / total) * 100);
  const passed = score >= 70;

  showScreen('result');

  document.getElementById('result-score').innerHTML = `${score}<span> / ${total}点</span>`;

  let biako, label, comment, labelColor;

  if (pct >= 90) {
    biako = 'guts';
    label = '🏆 合格！最高得点！';
    labelColor = '#FFCC00';
    comment = `<strong>完璧です！！</strong><br>さすがウマ娘！有馬記念どころかジャパンカップも獲れます！ビア子、感激で震えています🍺`;
  } else if (pct >= 70) {
    biako = 'happy';
    label = '✅ 合格！おめでとう！';
    labelColor = '#FFCC00';
    comment = `<strong>合格ライン突破！</strong><br>びあけん2級合格です！ビア子、誇らしいです！もう一周して満点を目指しましょう🏆`;
  } else if (pct >= 60) {
    biako = 'cry';
    label = '😢 惜しい！もう少し！';
    labelColor = '#fff';
    comment = `<strong>あと少し！</strong><br>合格まで惜しかった…${70 - score}問足りなかったです。弱点ジャンルを重点的に復習してもう一周！`;
  } else if (pct >= 50) {
    biako = 'sad';
    label = '📚 もっと特訓が必要！';
    labelColor = '#fff';
    comment = `<strong>うーん…</strong><br>まだまだ特訓が必要です！ビア子も反省して一緒に頑張ります。公式テキストと合わせて復習しよう！`;
  } else {
    biako = 'angry';
    label = '💦 大特訓開始！';
    labelColor = '#ff6666';
    comment = `<strong>これは…！</strong><br>ビア子、怒ってるんじゃなくて…本気で心配してます！基礎から一緒にやり直しましょう！諦めたらそこで試合終了ですよ！`;
  }

  document.getElementById('result-biako').src = `biako_${biako}.png`;
  document.getElementById('result-label').textContent = label;
  document.getElementById('result-label').style.color = labelColor;
  document.getElementById('result-comment').innerHTML = comment;
}

// =============================
// ビア子表情切り替え
// =============================
function setBiako(expression, message) {
  const img = document.getElementById('biako-img');
  img.style.opacity = '0';
  setTimeout(() => {
    img.src = `biako_${expression}.png`;
    img.style.opacity = '1';
  }, 150);
  document.getElementById('biako-bubble').textContent = message;
}

// 初期表示
showScreen('start');
